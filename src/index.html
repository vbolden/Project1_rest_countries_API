<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Countries API</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="./js/countriesApi.js" defer></script>
    <script src="./js/theme.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <header class="shadow-sm" id="header">
        <nav class="container d-flex justify-content-between align-items-center py-3 py-md-4 mw-100 px-5">
            <span class="fw-bold">Where in the world?</span>

            <a href="#" id="theme" class="text-decoration-none d-flex align-items-center gap-1">
                <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
                <span id="theme-text">Dark Mode</span>
            </a>
        </nav>
    </header>
    <main>

        <div class="container-fluid px-5 my-5">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div style="max-width: 350px; width: 100%;">
                    <div id="search-container" class="d-flex align-items-center gap-2 p-1 shadow-sm rounded">
                        <ion-icon name="search-outline" id="search-icon"></ion-icon>
                        <input type="text" id="search" class="form-control border-0"
                            placeholder="Search for a country...">
                    </div>
                </div>

                <div style="width: 200px;" class="dropdown">
                    <select id="filter" class="form-select">
                        <option selected value="All">Filter by Region</option>
                        <option value="Africa">Africa</option>
                        <option value="Americas">Americas</option>
                        <option value="Asia">Asia</option>
                        <option value="Europe">Europe</option>
                        <option value="Oceania">Oceania</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row px-5 g-4" id="cards-list"></div>
    </main>
</body>

</html>
