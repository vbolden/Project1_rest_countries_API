<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Countries API</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="./js/countriesApi.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <header class="shadow-sm bg-white">
        <nav class="container d-flex justify-content-between align-items-center py-3 py-md-4">
            <span class="fw-bold">Where in the world?</span>

            <a href="#" id="theme" class="text-decoration-none text-dark d-flex align-items-center gap-2">
                <ion-icon name="moon-outline"></ion-icon>
                <span>Dark Mode</span>
            </a>
        </nav>
    </header>
    <main>
        <div class="input-container">
            <div id="search-container">
                <ion-icon name="search-outline" id="search-icon"></ion-icon>
                <input type="text" id="search" placeholder="Search for a country...">
            </div>
            <select id="filter" aria-label="Default select example">
                <option selected>Filter by Region</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
            </select>
        </div>
        <div class="row" id="cards-list">
        </div>
    </main>
</body>

</html>
