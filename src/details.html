<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Details</title>
    <link rel="stylesheet" href="style.css">
    <script src="./js/renderDetails.js" defer></script>
    <script src="./js/theme.js" defer></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body id="details">
    <header class="shadow-sm" id="header">
        <nav class="container d-flex justify-content-between align-items-center py-3 py-md-4 mw-100 px-5">
            <span class="fw-bold">Where in the world?</span>

            <a href="#" id="theme" class="text-decoration-none d-flex align-items-center gap-1">
                <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
                <span id="theme-text">Dark Mode</span>
            </a>
        </nav>
    </header>

    <main>
        <section>
            <div class="container-fluid px-5">
                <button class="rounded border-0 shadow pe-5 py-1 my-5" id="back-btn" style="font-size: 14px;"><ion-icon class="mx-3" name="caret-back"></ion-icon>Back</button>
            </div>
        </section>

        <section>
            <div class="container">
                <div class="row">
                    <div class="col" id="flag-container"></div>
                    <div class="col" id="details-container"></div>
                </div>
            </div>
        </section>

        <section>
            <div class="container" id="borders-container"></div>
        </section>
    </main>

</body>

</html>
